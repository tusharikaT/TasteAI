<style>

            color: #e5e2e1;

            background: rgba(26, 26, 26, 0.6);

            -webkit-backdrop-filter: blur(12px);

            box-shadow: 0px 10px 30px rgba(255, 87, 34, 0.15);
        }
        
        /* Custom Range Slider Styling */
        input[type=range]::-webkit-slider-thumb {

            height: 24px;

<body class="min-h-screen flex flex-col antialiased selection:bg-primary/30 selection:text-primary-fixed">
<!-- TopNavBar component implementation based on JSON -->
<nav class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-white/10 shadow-[0px_10px_30px_rgba(255,87,34,0.15)]">
<div class="flex justify-between items-center px-margin-mobile md:px-margin-desktop py-4 max-w-container-max mx-auto">
<div class="font-display-hero-mobile text-display-hero-mobile md:font-display-hero md:text-display-hero text-primary tracking-tight">TasteAI</div>
<div class="hidden">Search</div>
<button class="text-primary font-bold hover:opacity-80 transition-opacity active:scale-95 transition-transform flex items-center gap-2">
<span class="font-label-md text-label-md">New Search</span>
<span class="material-symbols-outlined text-[20px]">search</span>
</button>
</div>
</nav>
<!-- Main Content Area with Background Imagery -->
<main class="flex-grow flex items-center justify-center pt-[100px] pb-stack-lg px-margin-mobile md:px-margin-desktop relative overflow-hidden min-h-screen">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="bg-cover bg-center w-full h-full absolute inset-0 mix-blend-screen" data-alt="A dark, moody abstract background featuring subtle wisps of orange and red smoke or steam rising against a deep obsidian background, evoking a premium, atmospheric high-end culinary environment. The lighting is very soft and cinematic, with a focus on warm glows." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDkcibZQuBkbvrLx4AIRl9PtkbEeoy69mN13wI2KIo6zDlSAufCTybajA9Gj3Ukz_8hkSVPxrdWeXC8tf26tE-jlBxWNhaWDwfcD6eiYr6PRICvxDnor9ODVhzaoMlgfk6BQgVGZ1N1XxT1kBWZIFMb2NYBlys6YvrDngUOou-ic6qvZm3kucWNO5xv0fQsq3h3GotrxrnfYIpFZtKSItSUpcFe_z7yKHxg3uYxfeH2zQCHG85Y_fjsszyJuEutjy3b298CBE-llQ')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/80 to-transparent"></div>
</div>
<!-- Preference Form Card -->
<div class="glass-card rounded-xl w-full max-w-[520px] p-stack-lg relative z-10 animate-[fadeIn_0.5s_ease-out]">
<header class="mb-stack-lg text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2 tracking-tight">Set Your Preferences</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Customize your search to find the perfect dining experience.</p>
</header>
<form class="space-y-stack-md flex flex-col" onsubmit="event.preventDefault();">
<!-- Location Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="location">
<span class="material-symbols-outlined text-[18px]">location_on</span>
                        Location
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg py-3 pl-12 pr-4 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-surface-variant" id="location" placeholder="City, neighborhood, or area..." type="text"/>
</div>
</div>
<!-- Budget Segmented Control -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">payments</span>
                        Budget Level
                    </label>
<div class="flex p-1 bg-surface-container-low rounded-lg border border-outline-variant relative isolate">
<!-- Active Background indicator (CSS controlled via JS class toggling ideally, showing static state here) -->
<div class="absolute inset-y-1 left-1 w-[calc(33.33%-4px)] bg-surface-bright rounded shadow-sm z-0 pointer-events-none transition-all duration-300" id="budget-indicator"></div>
<label class="flex-1 text-center py-2 relative z-10 cursor-pointer">
<input checked="" class="peer sr-only" name="budget" type="radio" value="low"/>
<span class="font-label-md text-label-md text-on-surface-variant peer-checked:text-on-surface transition-colors">Low ($)</span>
</label>
<label class="flex-1 text-center py-2 relative z-10 cursor-pointer">
<input class="peer sr-only" name="budget" type="radio" value="medium"/>
<span class="font-label-md text-label-md text-on-surface-variant peer-checked:text-on-surface transition-colors">Medium ($$)</span>
</label>
<label class="flex-1 text-center py-2 relative z-10 cursor-pointer">
<input class="peer sr-only" name="budget" type="radio" value="high"/>
<span class="font-label-md text-label-md text-on-surface-variant peer-checked:text-on-surface transition-colors">High ($$$)</span>
</label>
</div>
</div>
<!-- Cuisine Chips -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">restaurant</span>
                        Cuisine Types
                    </label>
<div class="flex gap-2 overflow-x-auto chip-scroll pb-2 -mx-2 px-2 mask-edges">
<label class="cursor-pointer whitespace-nowrap shrink-0">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all hover:bg-surface-bright">
                                Italian
                            </div>
</label>
<label class="cursor-pointer whitespace-nowrap shrink-0">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all hover:bg-surface-bright">
                                Japanese
                            </div>
</label>
<label class="cursor-pointer whitespace-nowrap shrink-0">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all hover:bg-surface-bright">
                                North Indian
                            </div>
</label>
<label class="cursor-pointer whitespace-nowrap shrink-0">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all hover:bg-surface-bright">
                                Mexican
                            </div>
</label>
<label class="cursor-pointer whitespace-nowrap shrink-0">
<input class="peer sr-only" type="checkbox"/>
<div class="px-4 py-2 rounded-full border border-outline-variant bg-surface-container-low text-on-surface-variant font-label-sm text-label-sm peer-checked:bg-primary/20 peer-checked:border-primary peer-checked:text-primary transition-all hover:bg-surface-bright">
                                Thai

</label>
</div>
</div>
<!-- Minimum Rating Slider -->
<div class="flex flex-col gap-4 py-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="rating">
<span class="material-symbols-outlined text-[18px] text-secondary">star</span>
                            Minimum Rating
                        </label>
<span class="font-headline-md text-headline-md text-on-surface" id="rating-val">4.0</span>
</div>
<div class="relative w-full h-2 bg-surface-container-highest rounded-full">
<div class="absolute top-0 left-0 h-full bg-secondary rounded-full pointer-events-none" style="width: 80%;"></div>
<input class="absolute top-1/2 -translate-y-1/2 w-full h-full appearance-none bg-transparent outline-none m-0" id="rating" max="5.0" min="3.0" oninput="document.getElementById('rating-val').textContent = parseFloat(this.value).toFixed(1)" step="0.1" type="range" value="4.0"/>
</div>
<div class="flex justify-between text-on-surface-variant font-label-sm text-label-sm opacity-50">
<span>3.0</span>
<span>5.0</span>
</div>
</div>
<!-- Additional Vibe Textarea -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2" for="vibe">
<span class="material-symbols-outlined text-[18px]">mood</span>
                        Additional Vibe
                    </label>
<textarea class="w-full bg-surface-container-low border border-outline-variant text-on-surface font-body-md text-body-md rounded-lg py-3 px-4 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors placeholder:text-surface-variant resize-none" id="vibe" placeholder="e.g., 'quiet workspace', 'romantic date night', 'pet friendly outdoor seating'..." rows="3"></textarea>
</div>
<!-- Submit Button -->
<div class="pt-stack-sm">
<button class="w-full bg-gradient-to-r from-[#ff5722] to-[#b02f00] hover:from-[#ffb5a0] hover:to-[#ff5722] text-white font-headline-md text-headline-md py-4 rounded-xl shadow-[0px_4px_14px_rgba(255,87,34,0.4)] transition-all duration-300 transform active:scale-[0.98] flex items-center justify-center gap-2 group" type="submit">
                        Get AI Recommendations
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<script>
        // Simple logic for budget indicator sliding
        const budgetRadios = document.querySelectorAll('input[name="budget"]');
        const indicator = document.getElementById('budget-indicator');
        
        budgetRadios.forEach((radio, index) => {
            radio.addEventListener('change', () => {
                if (index === 0) {
                    indicator.style.left = '4px';
                } else if (index === 1) {
                    indicator.style.left = 'calc(33.33% + 2px)';
                } else if (index === 2) {
                    indicator.style.left = 'calc(66.66% + 0px)';
                }
            });
        });
    </script>
</body></html>
