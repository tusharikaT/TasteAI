<style>
        .loader-ring {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: theme('colors.primary');
            border-bottom-color: theme('colors.secondary-container');
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            position: relative;
        }

        .loader-ring::before {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-left-color: theme('colors.primary');
            border-right-color: theme('colors.secondary-container');
            animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-text {
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            position: absolute;
            width: 100%;
            text-align: center;
        }

        .fade-text.active {
            opacity: 1;
        }

        .progress-bar-fill {
            width: 0%;
            transition: width 0.5s linear;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

<p class="fade-text" id="msg-2">Asking our AI chef for recommendations...</p>

<!-- Progress Bar Pinned to Bottom -->

<div class="progress-bar-fill h-full bg-gradient-to-r from-primary-container to-secondary-container shadow-[0px_0px_10px_rgba(255,87,34,0.8)]" id="progress-bar"></div>
</div>
<!-- Lightweight Particle Script -->
<script>
        // Simple Particle System
        const canvas = document.createElement('canvas');
        document.getElementById('particles-js').appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = (Math.random() * 0.5) - 0.25;
                this.speedY = (Math.random() * 0.5) - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 181, 160, 0.5)'; // primary color with opacity
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        // Text Cycling Logic
        const messages = document.querySelectorAll('.fade-text');
        let currentMessage = 0;

        setInterval(() => {
            messages[currentMessage].classList.remove('active');
            currentMessage = (currentMessage + 1) % messages.length;
            messages[currentMessage].classList.add('active');
        }, 2000);

        // Progress Bar Logic (Simulating an 8-second load)
        const progressBar = document.getElementById('progress-bar');
        let progress = 0;
        const totalTime = 8000; // 8 seconds total
        const intervalTime = 100; // Update every 100ms
        const increment = (100 / (totalTime / intervalTime));

        const progressInterval = setInterval(() => {
            progress += increment;
            if (progress >= 100) {
                progress = 100;
                clearInterval(progressInterval);
                // Redirect or transition logic would go here
            }
            progressBar.style.width = `${progress}%`;
        }, intervalTime);

    </script>
